<style>
/* ===== CSS Custom Properties ===== */
:root {
  --bg:        oklch(99% 0.002 240);
  --surface:   oklch(100% 0 0);
  --fg:        oklch(18% 0.012 250);
  --muted:     oklch(54% 0.012 250);
  --border:    oklch(92% 0.005 250);
  --accent:    oklch(58% 0.18 255);
  --accent-hex: #3B6FF6;
  --accent-dim: oklch(58% 0.18 255 / 0.1);
  --success:   #34C759;
  --danger:    #FF3B30;
  --ios-bg:    #F2F2F7;

  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;

  --phone-w: 390px;
  --phone-h: 844px;
  --phone-radius: 48px;
  --status-h: 54px;
  --nav-h: 44px;
  --bottom-safe: 34px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: #E8E8ED;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

.phone-frame {
  width: var(--phone-w); height: var(--phone-h);
  background: #000; border-radius: var(--phone-radius);
  padding: 12px; position: relative;
  box-shadow: 0 0 0 2px #1a1a1a, 0 0 0 4px #0d0d0d, 0 20px 60px rgba(0,0,0,0.35);
  flex-shrink: 0;
}

.phone-screen {
  width:100%; height:100%; background: var(--ios-bg);
  border-radius: calc(var(--phone-radius) - 12px);
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}

/* Dynamic Island */
.dynamic-island {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:126px; height:36px; background:#000; border-radius:20px; z-index:100;
}

/* Status Bar */
.status-bar {
  height:var(--status-h); padding:14px 28px 0;
  display:flex; align-items:center; justify-content:space-between;
  font-size:12px; font-weight:600; color:#000; flex-shrink:0; position:relative; z-index:50;
}
.status-bar .time { width:54px; text-align:center; }
.status-bar .icons { display:flex; align-items:center; gap:6px; }
.status-bar .icons svg { width:16px; height:16px; }

/* Nav */
.nav-bar {
  height:var(--nav-h); display:flex; align-items:center;
  padding:0 8px; flex-shrink:0; position:relative; z-index:50;
}
.nav-back {
  width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border-radius:50%; transition:background 0.15s; flex-shrink:0;
}
.nav-back:active { background:rgba(0,0,0,0.08); }
.nav-back svg { width:20px; height:20px; color:var(--accent-hex); }
.nav-title {
  font-size:17px; font-weight:600; color:var(--fg); flex:1;
  text-align:center; margin-right:44px; letter-spacing:0.02em;
}

/* Content */
.content-area {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:0 16px; scroll-behavior:smooth;
}
.content-area::-webkit-scrollbar { display:none; }

.section-header {
  font-size:13px; font-weight:500; color:var(--muted);
  text-transform:uppercase; letter-spacing:0.04em; padding:8px 4px 10px;
}

/* Card list */
.card-list { display:flex; flex-direction:column; gap:8px; }

.bank-card {
  display:flex; align-items:center; background:var(--surface);
  border-radius:14px; padding:14px; cursor:pointer;
  transition:all 0.18s ease; border:2px solid transparent;
  position:relative; gap:12px; -webkit-tap-highlight-color:transparent;
}
.bank-card:active { transform:scale(0.985); background:oklch(97% 0.003 250); }
.bank-card.selected {
  border-color:var(--accent-hex); background:var(--accent-dim);
}

.bank-icon {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:700; color:#fff; flex-shrink:0;
}

.bank-info { flex:1; min-width:0; }
.bank-name { font-size:16px; font-weight:500; color:var(--fg); line-height:1.3; }
.bank-number { font-size:13px; color:var(--muted); line-height:1.4; margin-top:2px; }

/* Radio */
.radio-btn {
  width:24px; height:24px; border-radius:50%;
  border:2px solid oklch(80% 0.008 250); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s ease;
}
.bank-card.selected .radio-btn { border-color:var(--accent-hex); background:var(--accent-hex); }
.bank-card.selected .radio-btn::after {
  content:''; display:block; width:6px; height:10px;
  border:solid #fff; border-width:0 2px 2px 0;
  border-radius:0; background:transparent;
  transform:rotate(45deg) translateY(-1px); opacity:1;
}

/* Add Card Row */
.add-card-row {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border-radius:14px;
  padding:16px 14px; cursor:pointer;
  transition:all 0.18s ease; margin-top:8px;
  border:1.5px dashed oklch(85% 0.01 250);
  -webkit-tap-highlight-color:transparent;
}
.add-card-row:active { transform:scale(0.985); background:oklch(97% 0.005 250); }

.add-card-icon {

  align-items:center; justify-content:center; flex-shrink:0;
}
.add-card-icon svg { width:22px; height:22px; color:var(--accent-hex); }

.add-card-text { flex:1; }
.add-card-title { font-size:15px; font-weight:500; color:var(--accent-hex); }

.add-card-arrow svg { width:16px; height:16px; color:oklch(70% 0.01 250); }

.card-list-divider { height:1px; background:var(--border); margin:4px 0; }

/* Empty State */
.empty-state {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 40px 40px; text-align:center;
  animation:fadeInUp 0.4s ease;
}
.empty-state.visible { display:flex; }
.card-list.hidden, .add-card-row.hidden, .card-list-divider.hidden { display:none; }

@keyframes fadeInUp {

}

.empty-title { font-size:17px; font-weight:600; color:var(--fg); margin-bottom:8px; }
.empty-desc { font-size:14px; color:var(--muted); line-height:1.6; max-width:250px; }

/* Bottom Action */
.bottom-action {

  flex-shrink:0; background:var(--ios-bg); position:relative; z-index:10;
}

.btn-primary {
  width:100%; height:50px; border-radius:14px; border:none;

  transition:all 0.18s ease; font-family:var(--font-body);

}
.btn-primary.active { background:var(--accent-hex); color:#fff; }
.btn-primary.disabled { background:oklch(88% 0.008 250); color:oklch(65% 0.01 250); cursor:not-allowed; pointer-events:none; }
.btn-primary:active:not(.disabled) { transform:scale(0.97); opacity:0.85; }
.btn-primary.loading { pointer-events:none; }

.btn-spinner {

}
.btn-primary.loading .btn-spinner { display:block; }
.btn-primary.loading .btn-label { opacity:0.7; }

@keyframes spin { to { transform:rotate(360deg); } }

/* Home Indicator */
.home-indicator {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  width:134px; height:5px; background:#000; border-radius:100px;
  z-index:100; opacity:0.2;
}

/* Toast */
.toast {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) translateY(20px);
  background:rgba(0,0,0,0.82); color:#fff; padding:12px 24px;
  border-radius:12px; font-size:14px; font-weight:500;
  opacity:0; pointer-events:none; z-index:200; white-space:nowrap;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.toast.show { opacity:1; transform:translate(-50%,-50%) translateY(0); }

/* Success Panel */
.success-panel {
  position:absolute; inset:0; z-index:150;
  display:flex; flex-direction:column;
  pointer-events:none; opacity:0;
  transition:opacity 0.25s ease;
  border-radius:calc(var(--phone-radius) - 12px);
  overflow:hidden;
}
.success-panel.show { opacity:1; pointer-events:auto; }

.success-panel-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.35); }

.success-panel-sheet {
  position:absolute; bottom:0; left:0; right:0;
  background:var(--surface); border-radius:24px 24px 0 0;
  padding:28px 24px; padding-bottom:calc(28px + var(--bottom-safe));
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  text-align:center;
}
.success-panel.show .success-panel-sheet { transform:translateY(0); }

.success-panel-icon {
  width:64px; height:64px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;

@keyframes popIn {

}

.success-panel-title {

}
.success-panel-desc { font-size:14px; color:var(--muted); line-height:1.5; margin-bottom:4px; }

.success-panel-card {

}
.success-panel-card .mini-icon {

}
.success-panel-card .mini-info { text-align:left; }
.success-panel-card .mini-name { font-size:14px; font-weight:500; color:var(--fg); }

.success-panel-close {

}
.success-panel-close:active { transform:scale(0.97); opacity:0.85; }

/* Demo hint */
.demo-hint {

}
</style>

<script>
/* ===== Bank Data ===== */
const bankCards = [
  { id:1, bank:'中国工商银行', type:'储蓄卡', last4:'8892', color:'#C41230', icon:'工' },
  { id:2, bank:'中国建设银行', type:'储蓄卡', last4:'5621', color:'#0067B8', icon:'建' },
  { id:3, bank:'招商银行',     type:'储蓄卡', last4:'3478', color:'#B41F32', icon:'招' },
  { id:4, bank:'中国银行',     type:'借记卡', last4:'1903', color:'#AD182D', icon:'中' },
  { id:5, bank:'中国农业银行', type:'储蓄卡', last4:'7256', color:'#00957D', icon:'农' },
];

/* ===== DOM ===== */
const cardList        = document.getElementById('cardList');
const cardListDivider = document.getElementById('cardListDivider');
const addCardRow      = document.getElementById('addCardRow');
const emptyState      = document.getElementById('emptyState');
const btnConfirm      = document.getElementById('btnConfirm');
const btnLabel        = document.getElementById('btnLabel');
const toast           = document.getElementById('toast');
const successPanel    = document.getElementById('successPanel');
const successIcon     = document.getElementById('successIcon');
const successCard     = document.getElementById('successCard');
const btnSuccessClose = document.getElementById('btnSuccessClose');
const btnBack         = document.getElementById('btnBack');

/* ===== State ===== */
let selectedCardId = null;
let isConfirming   = false;
const isEmptyMode  = window.location.hash === '#empty';

function init() {
  if (isEmptyMode) {
    showEmptyState();
  } else {
    showHasCardsState();
  }
}

function showHasCardsState() {
  cardList.classList.remove('hidden');
  cardListDivider.classList.remove('hidden');
  addCardRow.classList.remove('hidden');
  emptyState.classList.remove('visible');
  btnConfirm.classList.add('disabled');
  btnConfirm.classList.remove('active','loading');
  btnLabel.textContent = '请选择退款卡';
  selectedCardId = null;

  cardList.querySelectorAll('.bank-card').forEach(c => c.remove());

  bankCards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'bank-card';
    el.dataset.cardId = card.id;
    el.innerHTML = `
      <div class="bank-icon" style="background:${card.color}">${card.icon}</div>
      <div class="bank-info">
        <div class="bank-name">${card.bank}</div>
        <div class="bank-number">${card.type} &nbsp;**** ${card.last4}</div>
      </div>
      <div class="radio-btn"></div>
    `;
    el.addEventListener('click', () => selectCard(card.id, el));
    cardList.appendChild(el);
  });
}

function showEmptyState() {
  cardList.classList.add('hidden');
  cardListDivider.classList.add('hidden');
  addCardRow.classList.add('hidden');
  emptyState.classList.add('visible');
  btnConfirm.classList.remove('disabled','loading');
  btnConfirm.classList.add('active');
  btnLabel.textContent = '去绑卡';
  selectedCardId = null;
}

function selectCard(id, el) {
  if (isConfirming) return;
  document.querySelectorAll('.bank-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCardId = id;

  btnConfirm.classList.remove('disabled');
  btnConfirm.classList.add('active');
  btnLabel.textContent = '确认退款到该卡';

  el.style.transform = 'scale(0.97)';
  setTimeout(() => { el.style.transform = ''; }, 120);
}

addCardRow.addEventListener('click', () => {
  if (isConfirming) return;
  isConfirming = true;
  btnConfirm.classList.add('loading');
  btnLabel.textContent = '前往绑卡…';

  setTimeout(() => {
    btnConfirm.classList.remove('loading');
    btnLabel.textContent = selectedCardId ? '确认退款到该卡' : '请选择退款卡';
    if (!selectedCardId) {
      btnConfirm.classList.add('disabled');
      btnConfirm.classList.remove('active');
    }
    showToast('正在前往绑卡页面…');
    isConfirming = false;
  }, 800);
});

btnConfirm.addEventListener('click', () => {
  if (isConfirming) return;

  if (isEmptyMode) {
    handleGoBindCard();
    return;
  }

  if (selectedCardId === null) return;
  const card = bankCards.find(c => c.id === selectedCardId);
  if (!card) return;

  isConfirming = true;
  btnConfirm.classList.add('loading');
  btnLabel.textContent = '处理中…';

  setTimeout(() => {
    btnConfirm.classList.remove('loading');
    btnLabel.textContent = '确认退款到该卡';
    showSuccessPanel(card);
  }, 900);
});

function handleGoBindCard() {
  isConfirming = true;
  btnConfirm.classList.add('loading');
  btnLabel.textContent = '前往绑卡…';

  setTimeout(() => {
    btnConfirm.classList.remove('loading');
    btnLabel.textContent = '去绑卡';
    showToast('正在前往绑卡页面…');
    isConfirming = false;
  }, 800);
}

function showSuccessPanel(card) {
  successIcon.style.background = card.color;
  successIcon.textContent = card.icon;
  successCard.innerHTML = `
    <div class="mini-icon" style="background:${card.color}">${card.icon}</div>
    <div class="mini-info">
      <div class="mini-name">${card.bank}</div>
      <div class="mini-num">${card.type} ···· ${card.last4}</div>
    </div>
  `;
  successPanel.classList.add('show');
}

btnSuccessClose.addEventListener('click', () => {
  successPanel.classList.remove('show');
  selectedCardId = null;
  isConfirming = false;
  btnConfirm.classList.add('disabled');
  btnConfirm.classList.remove('active','loading');
  btnLabel.textContent = '请选择退款卡';
  document.querySelectorAll('.bank-card').forEach(c => c.classList.remove('selected'));
});

successPanel.querySelector('.success-panel-backdrop').addEventListener('click', () => {
  btnSuccessClose.click();
});

function showToast(msg) {
  toast.textContent = msg;
  toast.className = 'toast show';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 1800);
}

btnBack.addEventListener('click', () => {
  if (isConfirming) return;
  showToast('返回上一页');
});

document.addEventListener('keydown', (e) => {
  if (!isEmptyMode) {
    if (e.key >= '1' && e.key <= '5' && bankCards[parseInt(e.key)-1]) {
      const el = document.querySelector(`.bank-card[data-card-id="${e.key}"]`);
      if (el) selectCard(parseInt(e.key), el);
    }
  }
  if (e.key === 'Enter' && !isConfirming) {
    btnConfirm.click();
  }
});

init();
</script>


</body></html>
